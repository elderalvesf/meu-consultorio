name: meu_consultorio
description: Consultório odontológico – app de gestão para dentistas.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Local database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Calendar
  add_2_calendar: ^3.0.1

  # Image picker
  image_picker: ^1.1.2

  # Internationalisation
  intl: ^0.19.0

  # Permissions
  permission_handler: ^11.3.1

  # Path utilities
  path_provider: ^2.1.4

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
